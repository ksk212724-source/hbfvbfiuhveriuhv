
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тревога</title>
<style>
  :root{
    --ink:#0b0d12;
    --paper:#f4f2ea;
    --siren-red:#e0332c;
    --siren-red-dark:#8f120d;
    --amber:#ffb703;
    --ok:#1f8a4c;
    --line: rgba(11,13,18,0.14);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--ink);
    font-family: 'Courier New', ui-monospace, Menlo, monospace;
    overflow:hidden;
    user-select:none;
  }

  #app{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    background:var(--ink);
    transition: background-color 0.06s linear;
  }

  #app.flash{
    animation: siren-flash 0.5s steps(1) infinite;
  }
  @keyframes siren-flash{
    0%   { background:var(--siren-red); }
    50%  { background:var(--siren-red-dark); }
    100% { background:var(--siren-red); }
  }

  .topbar{
    padding: 18px 20px 10px;
    display:flex; align-items:center; justify-content:space-between;
    color: var(--paper);
    opacity:0.85;
    letter-spacing:0.12em;
    font-size:11px;
    text-transform:uppercase;
    z-index:3;
  }
  .dot{
    width:8px; height:8px; border-radius:50%;
    background:#3a3f4d; display:inline-block; margin-right:8px;
    vertical-align:middle;
  }
  .dot.live{ background:var(--siren-red); box-shadow:0 0 8px var(--siren-red); }

  main{
    flex:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; z-index:2;
    padding: 24px;
    text-align:center;
  }

  h1{
    color:var(--paper);
    font-size: 26px;
    line-height:1.25;
    margin: 0 0 34px;
    font-weight:700;
    max-width:320px;
    letter-spacing:-0.01em;
  }

  .press-btn{
    width:200px; height:200px;
    border-radius:50%;
    border: none;
    background: transparent;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: transform 0.15s ease;
    position:relative;
    padding:0;
  }
  .press-btn:active{ transform: scale(0.94); }
  .press-btn::before{
    content:'';
    position:absolute; inset:-16px;
    border-radius:50%;
    border:1px solid var(--line);
  }
  .press-btn .emoji{
    font-size: 128px;
    line-height:1;
    filter: drop-shadow(0 6px 18px rgba(0,0,0,0.35));
    transition: transform 0.2s ease;
    animation: idle-bob 2.6s ease-in-out infinite;
  }
  @keyframes idle-bob{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-6px) rotate(-2deg); }
  }
  .press-btn.armed .emoji{
    animation: panic-shake 0.18s linear infinite;
  }
  @keyframes panic-shake{
    0%{ transform: translate(0,0) rotate(0deg); }
    25%{ transform: translate(-3px,2px) rotate(-4deg); }
    50%{ transform: translate(3px,-2px) rotate(4deg); }
    75%{ transform: translate(-2px,-2px) rotate(-3deg); }
    100%{ transform: translate(0,0) rotate(0deg); }
  }

  .hint{
    margin-top: 28px;
    color: var(--paper);
    opacity:0.5;
    font-size:12px;
    letter-spacing:0.05em;
    max-width: 260px;
  }

  /* ---- panel ---- */
  #panel{
    position:fixed; inset:0;
    z-index:10;
    display:none;
    align-items:flex-end;
    justify-content:center;
    background: rgba(0,0,0,0.55);
  }
  #panel.open{ display:flex; }

  .sheet{
    width:100%;
    max-width: 480px;
    background: var(--paper);
    border-radius: 20px 20px 0 0;
    padding: 22px 20px calc(26px + env(safe-area-inset-bottom));
    box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
    animation: sheet-up 0.22s ease-out;
  }
  @keyframes sheet-up{
    from{ transform: translateY(24px); opacity:0; }
    to{ transform: translateY(0); opacity:1; }
  }

  .sheet-handle{
    width:36px; height:4px; border-radius:2px;
    background: var(--line);
    margin: 0 auto 16px;
  }

  .sheet-title{
    font-size:17px; font-weight:700; color:var(--ink);
    margin: 0 0 4px;
    display:flex; align-items:center; gap:8px;
  }
  .sheet-sub{
    font-size:13px; color:#5b5f6b; margin:0 0 18px;
    line-height:1.4;
  }

  .problem{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
    padding: 14px 4px;
    border-bottom: 1px solid var(--line);
  }
  .problem:last-of-type{ border-bottom:none; }

  .expr{
    font-size:19px; font-weight:700; color:var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .expr .solved-mark{
    color: var(--ok); margin-left:8px; font-size:15px;
  }

  .answer-input{
    width: 84px;
    padding: 10px 10px;
    border-radius: 10px;
    border: 2px solid var(--line);
    font-family: inherit;
    font-size: 17px;
    text-align:center;
    background: #fff;
    color: var(--ink);
    outline:none;
    transition: border-color 0.15s ease;
  }
  .answer-input:focus{ border-color: var(--ink); }
  .answer-input.wrong{ border-color: var(--siren-red); }
  .answer-input.correct{ border-color: var(--ok); background:#eef8f1; }
  .answer-input:disabled{ opacity:0.6; }

  .progress-row{
    display:flex; gap:6px; margin: 18px 0 4px;
  }
  .progress-seg{
    flex:1; height:5px; border-radius:3px;
    background: var(--line);
    overflow:hidden;
  }
  .progress-seg .fill{
    height:100%; width:0%;
    background: var(--ok);
    transition: width 0.25s ease;
  }
  .progress-seg.done .fill{ width:100%; }

  .status-line{
    margin-top:14px;
    font-size:12px;
    letter-spacing:0.03em;
    color:#8a8f9c;
    text-align:center;
  }

  .all-clear{
    display:none;
    text-align:center;
    padding: 10px 0 4px;
  }
  .all-clear.show{ display:block; }
  .all-clear .mark{
    font-size:40px; color:var(--ok); margin-bottom:8px;
  }
  .all-clear h2{
    margin:0 0 6px; color:var(--ink); font-size:18px;
  }
  .all-clear p{
    margin:0; color:#5b5f6b; font-size:13px;
  }
</style>
</head>
<body>

<div id="app">

  <main>
    <button class="press-btn" id="mainBtn"><span class="emoji" id="mainEmoji">🙂</span></button>
  </main>
</div>

<div id="panel">
  <div class="sheet">
    <div class="sheet-handle"></div>

    <div id="quizBlock">
      <div class="sheet-title">🚨 Отключение сирены</div>
      <p class="sheet-sub">Решите все 3 примера правильно, чтобы остановить сигнал.</p>

      <div id="problemsList"></div>

      <div class="progress-row" id="progressRow"></div>
      <div class="status-line" id="statusLine">Осталось решить: 3</div>
    </div>

    <div class="all-clear" id="allClear">
      <div class="mark">✓</div>
      <h2>Сирена остановлена</h2>
      <p>Все примеры решены верно.</p>
    </div>
  </div>
</div>

<script>
(function(){
  // ==========================================================
  // BOT CONFIG — заполни своими данными, если хочешь получать
  // уведомление в Telegram при активации/остановке сирены.
  // Оставь пустым, если не нужно — код просто ничего не отправит.
  //
  // BOT_TOKEN — токен твоего бота от @BotFather (пример: '123456:AAаbcDEF...')
  // CHAT_ID   — твой chat_id или id чата/канала, куда слать уведомления
  //
  // ВНИМАНИЕ: хранить токен бота прямо во фронтенд-коде небезопасно —
  // любой, кто откроет исходники мини-аппа, сможет его увидеть и
  // использовать твоего бота от своего имени. Для реального продакшена
  // лучше делать запрос не напрямую с фронта, а через свой backend,
  // который уже знает токен и ничего не отдаёт наружу.
  // ==========================================================
  var BOT_CONFIG = {
    BOT_TOKEN: '',   // например: '123456789:AAExampleTokenHere'
    CHAT_ID: ''      // например: '987654321'
  };

  function notifyBot(text){
    if (!BOT_CONFIG.BOT_TOKEN || !BOT_CONFIG.CHAT_ID) return; // не настроено — тихо выходим
    var url = 'https://api.telegram.org/bot' + BOT_CONFIG.BOT_TOKEN + '/sendMessage';
    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: BOT_CONFIG.CHAT_ID, text: text })
    }).catch(function(err){ console.warn('notifyBot failed', err); });
  }

  // ---------- Telegram WebApp integration (safe no-op if absent) ----------
  var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
  if (tg) { try { tg.ready(); tg.expand(); } catch(e){} }

  // ---------- state ----------
  var appEl = document.getElementById('app');
  var mainBtn = document.getElementById('mainBtn');
  var mainEmoji = document.getElementById('mainEmoji');
  var panel = document.getElementById('panel');
  var problemsList = document.getElementById('problemsList');
  var progressRow = document.getElementById('progressRow');
  var statusLine = document.getElementById('statusLine');
  var quizBlock = document.getElementById('quizBlock');
  var allClear = document.getElementById('allClear');

  var active = false;

  // ---------- siren via WebAudio (harsh "air-raid" style) ----------
  var audioCtx = null;
  var oscA = null, oscB = null, subOsc = null, gainNode = null, lfo = null, lfoGain = null, ampLfo = null, ampLfoGain = null, dryGain = null;
  var audioUnlocked = false;

  // Создаёт AudioContext и сразу "разблокирует" его коротким
  // беззвучным буфером — это нужно делать СИНХРОННО внутри
  // обработчика клика, иначе Telegram WebView (iOS/Android)
  // может не дать звуку играть дальше.
  function ensureAudio(){
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // разблокировка: мгновенный тихий буфер, запущенный синхронно с жестом
    var buffer = audioCtx.createBuffer(1, 1, 22050);
    var unlockSource = audioCtx.createBufferSource();
    unlockSource.buffer = buffer;
    unlockSource.connect(audioCtx.destination);
    unlockSource.start(0);
  }

  function startSiren(){
    // audioCtx уже создан и разблокирован через ensureAudio() в обработчике клика
    if (!audioCtx) ensureAudio();

    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.0001;
    gainNode.connect(audioCtx.destination);
    gainNode.gain.exponentialRampToValueAtTime(0.9, audioCtx.currentTime + 0.5);

    // main wailing oscillator — slow, deep sweep like an air-raid siren
    oscA = audioCtx.createOscillator();
    oscA.type = 'sawtooth';
    oscA.frequency.value = 480;

    lfo = audioCtx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.35; // slow, ominous sweep speed

    lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 260; // sweep depth (Hz)

    lfo.connect(lfoGain);
    lfoGain.connect(oscA.frequency);

    // second oscillator, detuned — adds a harsh, dissonant beating
    oscB = audioCtx.createOscillator();
    oscB.type = 'square';
    oscB.frequency.value = 486; // slightly off from oscA -> beating/roughness

    var lfo2 = audioCtx.createOscillator();
    lfo2.type = 'sine';
    lfo2.frequency.value = 0.35;
    var lfo2Gain = audioCtx.createGain();
    lfo2Gain.gain.value = 260;
    lfo2.connect(lfo2Gain);
    lfo2Gain.connect(oscB.frequency);

    // low sub oscillator for a rumbling, alarming undertone
    subOsc = audioCtx.createOscillator();
    subOsc.type = 'triangle';
    subOsc.frequency.value = 60;
    var subGain = audioCtx.createGain();
    subGain.gain.value = 0.5;

    // amplitude LFO -> fast pulsing "screech" on top of the wail
    ampLfo = audioCtx.createOscillator();
    ampLfo.type = 'square';
    ampLfo.frequency.value = 7; // fast chop
    ampLfoGain = audioCtx.createGain();
    ampLfoGain.gain.value = 0.18;
    dryGain = audioCtx.createGain();
    dryGain.gain.value = 0.82;
    ampLfo.connect(ampLfoGain);
    ampLfoGain.connect(dryGain.gain);

    oscA.connect(dryGain);
    oscB.connect(dryGain);
    dryGain.connect(gainNode);

    subOsc.connect(subGain);
    subGain.connect(gainNode);

    oscA.start(); oscB.start(); subOsc.start();
    lfo.start(); lfo2.start(); ampLfo.start();

    // keep refs to stop later
    oscA._extra = [lfo, lfo2, ampLfo, subOsc];
  }

  function stopSiren(){
    if (!audioCtx) return;
    var now = audioCtx.currentTime;
    if (gainNode){
      gainNode.gain.cancelScheduledValues(now);
      gainNode.gain.setValueAtTime(gainNode.gain.value, now);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
    }
    setTimeout(function(){
      [oscA, oscB, subOsc].concat(oscA && oscA._extra ? oscA._extra : []).forEach(function(node){
        try{ node && node.stop(); }catch(e){}
      });
      oscA = null; oscB = null; subOsc = null; lfo = null; lfoGain = null; ampLfo = null; ampLfoGain = null; dryGain = null; gainNode = null;
    }, 400);
  }

  // ---------- flashing screen ----------
  function startFlash(){ appEl.classList.add('flash'); }
  function stopFlash(){ appEl.classList.remove('flash'); }

  // ---------- vibration (if supported, e.g. Telegram in-app) ----------
  function buzz(pattern){
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  // ---------- math problems ----------
  function randInt(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }

  function makeProblem(difficulty){
    var ops = ['+','-','×'];
    var op = ops[randInt(0,2)];
    var a,b,answer,text;
    if (op === '+'){
      a = randInt(12, 89); b = randInt(12, 89);
      answer = a+b; text = a+' + '+b;
    } else if (op === '-'){
      a = randInt(30, 99); b = randInt(10, a-1);
      answer = a-b; text = a+' − '+b;
    } else {
      a = randInt(3, 12); b = randInt(3, 12);
      answer = a*b; text = a+' × '+b;
    }
    return { text: text, answer: answer };
  }

  var problems = [];
  var solvedCount = 0;

  function buildQuiz(){
    problems = [makeProblem(), makeProblem(), makeProblem()];
    solvedCount = 0;
    problemsList.innerHTML = '';
    progressRow.innerHTML = '';

    problems.forEach(function(p, idx){
      var row = document.createElement('div');
      row.className = 'problem';

      var expr = document.createElement('div');
      expr.className = 'expr';
      expr.innerHTML = p.text + ' = <span class="solved-mark" data-mark="'+idx+'"></span>';

      var input = document.createElement('input');
      input.className = 'answer-input';
      input.type = 'tel';
      input.inputMode = 'numeric';
      input.placeholder = '?';
      input.setAttribute('data-idx', idx);
      input.maxLength = 6;

      input.addEventListener('input', function(){
        input.classList.remove('wrong');
        checkAnswer(idx, input);
      });

      row.appendChild(expr);
      row.appendChild(input);
      problemsList.appendChild(row);

      var seg = document.createElement('div');
      seg.className = 'progress-seg';
      seg.innerHTML = '<div class="fill"></div>';
      seg.setAttribute('data-seg', idx);
      progressRow.appendChild(seg);
    });

    statusLine.textContent = 'Осталось решить: 3';
    quizBlock.style.display = '';
    allClear.classList.remove('show');
  }

  var solvedFlags = [false,false,false];

  function checkAnswer(idx, input){
    var val = input.value.trim();
    if (val === '') return;
    var num = parseInt(val, 10);
    if (num === problems[idx].answer && !solvedFlags[idx]){
      solvedFlags[idx] = true;
      solvedCount++;
      input.classList.add('correct');
      input.disabled = true;
      var mark = document.querySelector('[data-mark="'+idx+'"]');
      if (mark) mark.textContent = '✓';
      var seg = document.querySelector('[data-seg="'+idx+'"]');
      if (seg) seg.classList.add('done');
      buzz(30);
      statusLine.textContent = solvedCount < 3
        ? 'Осталось решить: ' + (3 - solvedCount)
        : 'Проверка...';
      if (solvedCount === 3){
        setTimeout(allSolved, 250);
      }
    } else if (num !== problems[idx].answer && val.length >= String(problems[idx].answer).length){
      input.classList.add('wrong');
    }
  }

  function allSolved(){
    stopSiren();
    stopFlash();
    active = false;

    quizBlock.style.display = 'none';
    allClear.classList.add('show');

    mainBtn.classList.remove('armed');
    mainEmoji.textContent = '😄';
    notifyBot('✅ Сирена остановлена');
    setTimeout(function(){ mainEmoji.textContent = '🙂'; }, 1500);

    setTimeout(function(){
      panel.classList.remove('open');
    }, 1400);
  }

  function openQuiz(){
    solvedFlags = [false,false,false];
    buildQuiz();
    panel.classList.add('open');
  }

  // ---------- activation ----------
  mainBtn.addEventListener('click', function(){
    if (active) {
      // already active — just resurface the quiz, do not allow silent stop
      openQuiz();
      return;
    }

    // ВАЖНО: ensureAudio() вызывается первым и синхронно —
    // это критично для Telegram WebView, иначе звук может не запуститься.
    ensureAudio();

    active = true;
    startFlash();
    buzz([80,60,80]);

    mainEmoji.textContent = '😱';
    mainBtn.classList.add('armed');
    notifyBot('🚨 Сирена активирована');

    if (tg && tg.HapticFeedback) { try{ tg.HapticFeedback.notificationOccurred('warning'); }catch(e){} }

    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(function(){
        startSiren();
      }).catch(function(){
        // резервный вариант, если promise не сработал ожидаемо
        startSiren();
      });
    } else {
      startSiren();
    }

    setTimeout(openQuiz, 350);
  });

  // Prevent closing the sheet by tapping the backdrop while still active
  panel.addEventListener('click', function(e){
    if (e.target === panel && active){
      // shake the sheet a little to signal "no escape without solving"
      var sheet = panel.querySelector('.sheet');
      sheet.animate(
        [{ transform:'translateX(0)' },{ transform:'translateX(-6px)' },{ transform:'translateX(6px)' },{ transform:'translateX(0)' }],
        { duration:220 }
      );
    }
  });

})();
</script>
</body>
</html>
